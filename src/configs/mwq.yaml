model:
  n_layer: 1
  n_head: 1
  n_embd: 256
  linear: True
  vocab_size: 20

data:
  tasks:
    - name: 'MovingWindowQuotient'
      task: 'MovingWindowQuotient'
      sep: 17
      n_train: 128
      n_test: 32
      min_num: 1
      max_num: 16
      k: 2
      p: 17
  num_tokens: 16
  mix: 'random'

train:
  lr: 0.0001
  grad_clip: -1
  num_steps: 500
  wandb: True
  wandb_run_name: 'mwq_linear_embeddingNotFrozen'
  wandb_project: 'loss_plateau_tf'
  save_ckpt: False
  ckpt_freq: 20
  ckpt_path: './ckpts/mwq_linear_embeddingNotFrozen.tar'
  seed: 67
  mask_input: True
  freeze_embedding: false
