model:
  n_layer: 1
  n_head: 1
  n_embd: 256
  linear: True
  vocab_size: 20

data:
  tasks:
    - name: 'MovingWindowProduct'
      task: 'MovingWindowProduct'
      sep: 17
      n_train: 128
      n_test: 64
      min_num: 1
      max_num: 16
      k: 2
      p: 17
  num_tokens: 16
  mix: 'random'

train:
  lr: 0.0001
  grad_clip: -1
  num_steps: 1000
  wandb: True
  watch_log_freq: 10
  wandb_run_name: 'mwp_linear_embeddingNotFrozen'
  wandb_project: 'loss_plateau_tf'
  save_ckpt: True
  ckpt_freq: 20
  ckpt_path: './ckpts/mwp_linear_embeddingNotFrozen/checkpoint.tar'
  seed: 67
  mask_input: True
  freeze_embedding: false
